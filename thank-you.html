<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-21Q3MZXTYD"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}

gtag('consent', 'default', {
  analytics_storage: 'denied'
});

gtag('js', new Date());

gtag('config', 'G-21Q3MZXTYD');
</script>


    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Thank You | Blackstone Legal Support</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
<link rel="icon"
      type="image/png"
      href="assets/images/logo.png">

<link rel="apple-touch-icon"
      href="assets/images/logo.png">

      <meta property="og:site_name"
      content="Blackstone Legal Support">

</head>

<body>

<section class="py-5">

    <div class="container">

        <div class="text-center py-5">

            <h1 class="mb-4">

                Thank You

            </h1>

            <p class="lead mb-4">

                Your enquiry has been successfully submitted.

                A member of Blackstone Legal Support will respond as soon as possible.

            </p>

            <a href="index.html"
               class="btn btn-primary">

                Return to Homepage

            </a>

        </div>

    </div>

</section>

<div id="cookie-banner" class="cookie-banner">

    <div class="cookie-text">

        We use cookies and Google Analytics to improve our website.
        See our <a href="privacy.html">Privacy Policy</a>.

    </div>

    <div class="cookie-buttons">

        <button id="reject-cookies"
                class="cookie-reject">

            Essential Only

        </button>

        <button id="accept-cookies"
                class="cookie-accept">

            Accept

        </button>

    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const banner =
        document.getElementById('cookie-banner');

    const accept =
        document.getElementById('accept-cookies');

    const reject =
        document.getElementById('reject-cookies');

    const consent =
        localStorage.getItem('cookieConsent');

    if(consent === 'accepted'){

        banner.style.display = 'none';

        gtag('consent', 'update', {
            analytics_storage: 'granted'
        });
    }

    if(consent === 'rejected'){

        banner.style.display = 'none';

        gtag('consent', 'update', {
            analytics_storage: 'denied'
        });
    }

    accept.addEventListener('click', function(){

        localStorage.setItem(
            'cookieConsent',
            'accepted'
        );

        gtag('consent', 'update', {
            analytics_storage: 'granted'
        });

        banner.style.display = 'none';

    });

    reject.addEventListener('click', function(){

        localStorage.setItem(
            'cookieConsent',
            'rejected'
        );

        gtag('consent', 'update', {
            analytics_storage: 'denied'
        });

        banner.style.display = 'none';

    });

});
</script>

</body>
</html>
